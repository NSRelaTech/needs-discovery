name: Sync Harmonica Sessions

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and sync NSRT sessions
        env:
          HARMONICA_API_KEY: ${{ secrets.HARMONICA_API_KEY }}
          HARMONICA_API_URL: https://app.harmonica.chat
        run: node .github/scripts/sync-sessions.js

      - name: Commit new sessions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sessions/
          if git diff --cached --quiet; then
            echo "No new sessions to commit"
          else
            git commit -m "Add new Harmonica session results

          Automated sync from app.harmonica.chat"
            git push
          fi
